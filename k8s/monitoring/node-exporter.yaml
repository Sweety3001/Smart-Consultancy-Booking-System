apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: node-exporter

spec:
  selector:
    matchLabels:
      app: node-exporter

  template:
    metadata:
      labels:
        app: node-exporter

    spec:
      containers:
      - name: node-exporter

        image: prom/node-exporter:v1.8.1

        ports:
        - containerPort: 9100
---
apiVersion: v1
kind: Service

metadata:
  name: node-exporter-service

spec:
  selector:
    app: node-exporter

  ports:
  - port: 9100
    targetPort: 9100